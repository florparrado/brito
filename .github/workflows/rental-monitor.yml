name: Rental monitor

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

concurrency:
  group: rental-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Get monitor files
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          STATE_BACKEND: upstash
          STATE_KEY: barcelona-rental-monitor:state
          MAX_PRICE: "2100"
          MIN_ROOMS: "3"
          MIN_AREA: "80"
        run: node src/monitor.js check

      - name: Export dashboard status
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          STATE_KEY: barcelona-rental-monitor:state
        run: node scripts/export-dashboard-status.js

      - name: Publish dashboard status
        run: |
          git config user.name "Flora monitor"
          git config user.email "actions@github.com"
          git add data/dashboard-status.json
          git diff --cached --quiet || git commit -m "Update dashboard status"
          git push
